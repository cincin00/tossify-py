<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ 변환 뷰어</title>
    <style>
      :root {
        --bg: #f4f7f1;
        --bg-accent: #d8efe1;
        --panel: #ffffff;
        --line: #d7ded4;
        --text: #1f2b21;
        --sub: #536254;
        --brand: #16794b;
        --brand-strong: #0f5f3a;
        --warn: #b14b00;
        --radius-lg: 18px;
        --radius-md: 12px;
        --shadow: 0 14px 36px rgba(21, 54, 38, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Pretendard", "SUIT", "Noto Sans KR", "Apple SD Gothic Neo",
          "Malgun Gothic", sans-serif;
        background:
          radial-gradient(circle at 10% 10%, var(--bg-accent), transparent 40%),
          radial-gradient(circle at 90% 0%, #f5e8cf, transparent 35%),
          var(--bg);
      }

      .wrap {
        max-width: 1380px;
        margin: 28px auto;
        padding: 0 18px 24px;
        animation: fade-in 0.4s ease;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .top {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        background: var(--panel);
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .title-line {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .title-tools {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      h1 {
        margin: 0;
        font-size: clamp(20px, 3vw, 30px);
        letter-spacing: -0.02em;
      }

      .badge {
        color: var(--brand-strong);
        background: #dff4ea;
        border: 1px solid #b5dfcb;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }

      .controls-grid {
        display: grid;
        gap: 8px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .controls-primary {
        border: 1px solid #e8efe6;
        border-radius: 12px;
        background: #f9fcf8;
        padding: 10px;
      }

      .controls-secondary {
        border: 1px solid #e8efe6;
        border-radius: 12px;
        background: #fdfefd;
        padding: 10px;
      }

      .file-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .upload-box {
        border: 1px dashed #84b89c;
        border-radius: 12px;
        background: #f1faf4;
        color: #1d5138;
        padding: 10px 14px;
        min-width: 260px;
        flex: 1 1 320px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 0.18s ease, background 0.18s ease;
      }

      .upload-box:hover {
        border-color: #4b966d;
        background: #e6f7ed;
      }

      .upload-box.drag {
        border-color: #16794b;
        background: #dcf2e5;
      }

      input[type="search"] {
        flex: 1 1 320px;
        min-width: 200px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        background: #fff;
      }

      select {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        font-size: 13px;
        background: #fff;
        color: var(--text);
      }

      button {
        border: 1px solid #0f5f3a;
        border-radius: 10px;
        padding: 9px 12px;
        background: var(--brand);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      button.alt {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
      }

      button.warn {
        border-color: #c86616;
        background: #ffe7d0;
        color: #843800;
      }

      button:hover {
        filter: brightness(0.97);
      }

      button:disabled {
        opacity: 0.56;
        cursor: not-allowed;
      }

      .meta {
        color: var(--sub);
        font-size: 13px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        border: 1px solid #e3ebdf;
        border-radius: 12px;
        background: #f9fcf8;
        padding: 10px 12px;
      }

      .stat-label {
        display: block;
        color: var(--sub);
        font-size: 12px;
      }

      .stat-value {
        margin-top: 5px;
        display: block;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .board {
        margin-top: 14px;
        display: grid;
        gap: 14px;
        grid-template-columns: 370px minmax(0, 1fr);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        background: #fbfdfb;
        min-height: 620px;
      }

      .list-head,
      .detail-head {
        padding: 14px 16px;
        border-bottom: 1px solid #e9eee8;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .detail-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .detail-actions button {
        min-width: 104px;
      }

      .post-list {
        max-height: 620px;
        overflow: auto;
      }

      .post-item {
        border: none;
        width: 100%;
        text-align: left;
        border-left: 4px solid transparent;
        border-bottom: 1px solid #f0f3ef;
        padding: 11px 14px;
        background: transparent;
        color: inherit;
      }

      .post-item:hover {
        background: #f5faf5;
      }

      .post-item.active {
        border-left-color: var(--brand);
        background: #e8f5ec;
      }

      .post-title {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .post-question {
        margin: 6px 0 0;
        color: #5f6d60;
        font-size: 11px;
        line-height: 1.45;
        display: none;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .post-item.active .post-question,
      .post-item:hover .post-question,
      .post-item:focus-visible .post-question {
        display: -webkit-box;
      }

      .post-sub {
        margin-top: 7px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        color: var(--sub);
        font-size: 12px;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 7px;
        background: #fff;
      }

      .chip.warn {
        color: #8f4503;
        border-color: #e3bb8f;
        background: #fff3e7;
      }

      .model-chip {
        opacity: 0.86;
      }

      .post-item:not(.active) .model-chip {
        display: none;
      }

      .detail {
        padding: 14px;
        display: grid;
        gap: 14px;
        background: #f7faf7;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      }

      .card {
        border: 1px solid #dde7df;
        border-radius: var(--radius-md);
        background: #ffffff;
        box-shadow: 0 1px 0 rgba(26, 52, 36, 0.03);
      }

      .card-head {
        padding: 10px 12px;
        border-bottom: 1px solid #e7eee8;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .card-title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
      }

      pre {
        margin: 0;
        padding: 15px 16px 17px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.72;
        font-size: 15px;
        max-width: 98ch;
      }

      .empty {
        padding: 30px 18px;
        color: var(--sub);
        text-align: center;
      }

      .hint {
        margin-top: 8px;
        color: var(--sub);
        font-size: 12px;
      }

      .hint code {
        background: #eff5ee;
        border: 1px solid #d6e1d6;
        border-radius: 8px;
        padding: 1px 6px;
      }

      .key-hint {
        margin: 0;
        color: #69806e;
        font-size: 11px;
        font-weight: 500;
      }

      .key-hint code {
        background: #eef5ee;
        border: 1px solid #d5e2d6;
        border-radius: 8px;
        padding: 1px 6px;
      }

      .detail-heading {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .copy-btn {
        padding: 7px 10px;
        font-size: 12px;
      }

      .guide-overlay {
        position: fixed;
        inset: 0;
        z-index: 9500;
        background: rgba(17, 34, 23, 0.46);
        padding: 0;
      }

      .guide-overlay[hidden] {
        display: none;
      }

      .guide-card {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9700;
        width: min(460px, calc(100vw - 32px));
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid #d8e4d8;
        box-shadow: 0 22px 48px rgba(15, 44, 30, 0.22);
        padding: 16px 16px 14px;
      }

      .guide-step {
        margin: 0;
        color: #57705f;
        font-size: 12px;
        font-weight: 700;
      }

      .guide-title {
        margin: 8px 0 0;
        font-size: 20px;
        line-height: 1.3;
      }

      .guide-desc {
        margin: 10px 0 0;
        color: #35503f;
        line-height: 1.58;
        font-size: 14px;
      }

      .guide-actions {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .guide-focus {
        position: relative;
        z-index: 9600;
        outline: 2px solid #1a8b56;
        outline-offset: 2px;
        border-radius: 12px;
        box-shadow: 0 0 0 4px rgba(26, 139, 86, 0.18);
      }

      .post-item.guide-focus {
        outline: none;
        box-shadow:
          inset 0 0 0 2px #1a8b56,
          0 0 0 3px rgba(26, 139, 86, 0.2);
      }

      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 9999;
        min-width: 180px;
        max-width: 360px;
        border-radius: 10px;
        padding: 10px 12px;
        background: #1a7f4f;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        box-shadow: 0 12px 26px rgba(22, 66, 44, 0.24);
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.error {
        background: #b14b00;
      }

      @media (max-width: 1080px) {
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .controls-primary,
        .controls-secondary {
          padding: 8px;
        }

        .board {
          grid-template-columns: 1fr;
        }

        .panel,
        .post-list {
          min-height: 460px;
          max-height: 460px;
        }
      }

      @media (max-width: 680px) {
        .stats {
          grid-template-columns: 1fr;
        }

        .controls {
          align-items: stretch;
        }

        .upload-box,
        input[type="search"],
        select,
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="top">
        <div class="title-line">
          <h1>FAQ 변환 CSV 뷰어</h1>
          <div class="title-tools">
            <button id="openGuide" class="alt" type="button">가이드 다시 보기</button>
            <span class="badge">HTML 단일 파일</span>
          </div>
        </div>
        <div class="controls-grid">
          <div class="controls controls-primary">
            <input id="csvFile" class="file-input" type="file" accept=".csv,text/csv" />
            <label id="dropZone" class="upload-box" for="csvFile">CSV 파일 선택 또는 드래그 앤 드롭</label>
            <button id="resetView" class="alt" type="button">필터 초기화</button>
          </div>
          <div class="controls controls-secondary">
            <input id="search" type="search" placeholder="제목/질문/원문/변환 내용 검색" />
            <button id="clearSearch" class="alt" type="button">검색 비우기</button>
            <select id="sortOrder" aria-label="정렬 순서">
              <option value="id_desc">정렬: ID 큰 순</option>
              <option value="id_asc">정렬: ID 작은 순</option>
              <option value="title_asc">정렬: 제목 가나다순</option>
            </select>
            <button id="toggleInsufficient" class="warn" type="button">보류건만 보기: OFF</button>
          </div>
        </div>
        <div id="meta" class="meta">CSV를 선택하면 목록/상세를 볼 수 있습니다.</div>
        <div class="hint">
          로컬 파일(`file://`) 환경에서는 브라우저 보안 정책상 파일 선택 방식만 동작합니다. `faq_b.csv`를 직접 선택해서 업로드하세요.
        </div>
        <div id="serverHint" class="hint"></div>
        <div class="stats">
          <div class="stat">
            <span class="stat-label">전체 데이터</span>
            <strong id="statTotal" class="stat-value">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">현재 표시</span>
            <strong id="statVisible" class="stat-value">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">정상 변환</span>
            <strong id="statOk" class="stat-value">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">보류/실패</span>
            <strong id="statInsufficient" class="stat-value">0</strong>
          </div>
        </div>
      </section>

      <section class="board">
        <article class="panel">
          <div class="list-head">
            <span>게시글 목록</span>
            <span id="countLabel" class="meta">0건</span>
          </div>
          <div id="postList" class="post-list">
            <div class="empty">데이터를 불러오면 목록이 표시됩니다.</div>
          </div>
        </article>

        <article class="panel">
          <div class="detail-head">
            <div class="detail-heading">
              <span>게시글 상세</span>
              <p class="key-hint">키보드 탐색: <code>↑</code> <code>↓</code></p>
            </div>
            <div id="copyActions" class="detail-actions">
              <button id="copyOriginalAll" class="alt" type="button">원문 전체 복사</button>
              <button id="copyTransformedAll" type="button">변환 전체 복사</button>
            </div>
          </div>
          <div id="detail" class="detail">
            <div class="empty">목록에서 게시글을 선택하세요.</div>
          </div>
        </article>
      </section>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="guideOverlay" class="guide-overlay" hidden>
      <div class="guide-card" role="dialog" aria-modal="true" aria-labelledby="guideTitle">
        <p id="guideStep" class="guide-step"></p>
        <h2 id="guideTitle" class="guide-title"></h2>
        <p id="guideDesc" class="guide-desc"></p>
        <div class="guide-actions">
          <button id="guideSkip" class="alt" type="button">닫기</button>
          <button id="guidePrev" class="alt" type="button">이전</button>
          <button id="guideNext" type="button">다음</button>
        </div>
      </div>
    </div>

    <script>
      const state = {
        rows: [],
        filtered: [],
        selectedIndex: -1,
        onlyInsufficient: false,
        sortOrder: "id_desc",
      };

      const fileInput = document.getElementById("csvFile");
      const dropZone = document.getElementById("dropZone");
      const openGuideButton = document.getElementById("openGuide");
      const searchInput = document.getElementById("search");
      const clearSearchButton = document.getElementById("clearSearch");
      const resetViewButton = document.getElementById("resetView");
      const toggleInsufficientButton = document.getElementById("toggleInsufficient");
      const sortOrderSelect = document.getElementById("sortOrder");
      const listContainer = document.getElementById("postList");
      const detailContainer = document.getElementById("detail");
      const metaLabel = document.getElementById("meta");
      const serverHint = document.getElementById("serverHint");
      const countLabel = document.getElementById("countLabel");
      const statTotal = document.getElementById("statTotal");
      const statVisible = document.getElementById("statVisible");
      const statOk = document.getElementById("statOk");
      const statInsufficient = document.getElementById("statInsufficient");
      const copyActions = document.getElementById("copyActions");
      const copyOriginalAll = document.getElementById("copyOriginalAll");
      const copyTransformedAll = document.getElementById("copyTransformedAll");
      const toast = document.getElementById("toast");
      const guideOverlay = document.getElementById("guideOverlay");
      const guideCard = guideOverlay.querySelector(".guide-card");
      const guideStepLabel = document.getElementById("guideStep");
      const guideTitleLabel = document.getElementById("guideTitle");
      const guideDescLabel = document.getElementById("guideDesc");
      const guideSkipButton = document.getElementById("guideSkip");
      const guidePrevButton = document.getElementById("guidePrev");
      const guideNextButton = document.getElementById("guideNext");
      const GUIDE_STORAGE_KEY = "faq_viewer_guide_seen_v1";
      let toastTimer = null;
      let guideTimer = null;
      let guideOpen = false;
      let guideIndex = 0;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function parseCsv(text) {
        const rows = [];
        let row = [];
        let cell = "";
        let i = 0;
        let inQuotes = false;

        const clean = text.replace(/^\uFEFF/, "");

        while (i < clean.length) {
          const ch = clean[i];

          if (inQuotes) {
            if (ch === '"') {
              if (clean[i + 1] === '"') {
                cell += '"';
                i += 2;
                continue;
              }
              inQuotes = false;
              i += 1;
              continue;
            }
            cell += ch;
            i += 1;
            continue;
          }

          if (ch === '"') {
            inQuotes = true;
            i += 1;
            continue;
          }
          if (ch === ",") {
            row.push(cell);
            cell = "";
            i += 1;
            continue;
          }
          if (ch === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
            i += 1;
            continue;
          }
          if (ch === "\r") {
            i += 1;
            continue;
          }

          cell += ch;
          i += 1;
        }

        row.push(cell);
        if (row.length > 1 || row[0] !== "") {
          rows.push(row);
        }

        if (rows.length === 0) {
          return [];
        }

        const header = rows[0];
        return rows.slice(1).map((values) => {
          const obj = {};
          for (let idx = 0; idx < header.length; idx += 1) {
            obj[header[idx]] = values[idx] || "";
          }
          return obj;
        });
      }

      function isInsufficient(row) {
        const text = row.transformed_text || "";
        return text.includes("원문 답변이 없어 안전하게 변환하지 않았어요.");
      }

      function sourceIdNumber(row) {
        const parsed = Number(row.source_id);
        return Number.isFinite(parsed) ? parsed : -1;
      }

      function sortRows(rows) {
        const sorted = rows.slice();
        if (state.sortOrder === "id_asc") {
          sorted.sort((a, b) => sourceIdNumber(a) - sourceIdNumber(b));
          return sorted;
        }
        if (state.sortOrder === "title_asc") {
          sorted.sort((a, b) =>
            String(a.original_title || "").localeCompare(
              String(b.original_title || ""),
              "ko"
            )
          );
          return sorted;
        }

        sorted.sort((a, b) => sourceIdNumber(b) - sourceIdNumber(a));
        return sorted;
      }

      function filteredRows() {
        const query = searchInput.value.trim().toLowerCase();
        const filtered = state.rows.filter((row) => {
          if (state.onlyInsufficient && !isInsufficient(row)) {
            return false;
          }

          if (!query) {
            return true;
          }

          const combined = [
            row.source_id,
            row.original_title,
            row.original_question,
            row.original_answer,
            row.transformed_text,
            row.model,
          ]
            .join("\n")
            .toLowerCase();
          return combined.includes(query);
        });
        return sortRows(filtered);
      }

      function updateStats() {
        const total = state.rows.length;
        const visible = state.filtered.length;
        const ok = state.rows.filter((row) => !isInsufficient(row)).length;
        const insufficient = total - ok;

        statTotal.textContent = String(total);
        statVisible.textContent = String(visible);
        statOk.textContent = String(ok);
        statInsufficient.textContent = String(insufficient);
      }

      function previewQuestion(row) {
        const raw = String(row.original_question || row.original_title || "");
        return raw.replace(/\s+/g, " ").trim();
      }

      function setMeta(text) {
        metaLabel.textContent = text;
      }

      function showToast(message, isError) {
        toast.textContent = message;
        if (isError) {
          toast.classList.add("error");
        } else {
          toast.classList.remove("error");
        }
        toast.classList.add("show");
        if (toastTimer) {
          clearTimeout(toastTimer);
        }
        toastTimer = setTimeout(() => {
          toast.classList.remove("show");
        }, 1400);
      }

      function hasSeenGuide() {
        try {
          return window.localStorage.getItem(GUIDE_STORAGE_KEY) === "1";
        } catch (error) {
          return false;
        }
      }

      function markGuideSeen() {
        try {
          window.localStorage.setItem(GUIDE_STORAGE_KEY, "1");
        } catch (error) {
          // ignore
        }
      }

      function getListGuideTarget() {
        return (
          listContainer.querySelector(".post-item.active") ||
          listContainer.querySelector(".post-item") ||
          listContainer
        );
      }

      function getGuideSteps() {
        return [
          {
            title: "CSV 파일 불러오기",
            desc: "`CSV 파일 선택 또는 드래그 앤 드롭` 영역에서 faq_b.csv를 업로드하면 목록/상세가 채워져요.",
            element: dropZone,
          },
          {
            title: "검색·정렬·보류 필터",
            desc: "제목/질문/본문 검색, 정렬 변경, 보류건만 보기 필터로 원하는 글을 빠르게 찾을 수 있어요.",
            element: searchInput,
          },
          {
            title: "게시글 목록 탐색",
            desc: "왼쪽 목록에서 게시글을 선택하면 오른쪽 상세가 즉시 바뀌고, 키보드 ↑ ↓ 로도 이동할 수 있어요.",
            element: getListGuideTarget(),
          },
          {
            title: "원문/변환 복사",
            desc: "게시글을 선택한 뒤 상세 카드 복사 버튼 또는 상단 전체 복사 버튼으로 원문/변환 내용을 바로 복사할 수 있어요.",
            element: copyActions || detailContainer,
          },
        ];
      }

      function clearGuideFocus() {
        document.querySelectorAll(".guide-focus").forEach((element) => {
          element.classList.remove("guide-focus");
        });
      }

      function focusGuideTarget(step) {
        clearGuideFocus();
        if (!step || !step.element || typeof step.element.classList === "undefined") {
          return;
        }
        step.element.classList.add("guide-focus");
        if (typeof step.element.scrollIntoView === "function") {
          step.element.scrollIntoView({ behavior: "auto", block: "center", inline: "nearest" });
        }
      }

      function positionGuideCard(step) {
        if (!guideCard) {
          return;
        }

        guideCard.style.top = "50%";
        guideCard.style.left = "50%";
        guideCard.style.transform = "translate(-50%, -50%)";

        if (!step || !step.element || typeof step.element.getBoundingClientRect !== "function") {
          return;
        }

        const margin = 16;
        const gap = 12;
        const rawRect = step.element.getBoundingClientRect();
        const cardRect = guideCard.getBoundingClientRect();
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const cardWidth = Math.min(cardRect.width || 460, viewportWidth - margin * 2);
        const cardHeight = cardRect.height || 240;
        const isHugeTarget = rawRect.height > viewportHeight * 0.56;
        const targetHeight = isHugeTarget
          ? Math.max(96, Math.min(150, Math.floor(viewportHeight * 0.26)))
          : rawRect.height;
        const targetTop = isHugeTarget ? rawRect.top + 8 : rawRect.top;
        const targetRect = {
          top: targetTop,
          left: rawRect.left,
          width: rawRect.width,
          height: targetHeight,
          right: rawRect.left + rawRect.width,
          bottom: targetTop + targetHeight,
        };

        let left = targetRect.left + (targetRect.width - cardWidth) / 2;
        if (targetRect.right + gap + cardWidth <= viewportWidth - margin) {
          left = targetRect.right + gap;
        } else if (targetRect.left - gap - cardWidth >= margin) {
          left = targetRect.left - gap - cardWidth;
        }

        const spaceBelow = viewportHeight - targetRect.bottom;
        const spaceAbove = targetRect.top;
        let top = targetRect.bottom + gap;
        if (spaceBelow < cardHeight + gap + margin && spaceAbove > spaceBelow) {
          top = targetRect.top - cardHeight - gap;
        }

        guideCard.style.left = `${Math.round(clamp(left, margin, viewportWidth - cardWidth - margin))}px`;
        guideCard.style.top = `${Math.round(clamp(top, margin, viewportHeight - cardHeight - margin))}px`;
        guideCard.style.transform = "none";
      }

      function renderGuideStep() {
        const steps = getGuideSteps();
        const step = steps[guideIndex];
        guideStepLabel.textContent = `가이드 ${guideIndex + 1}/${steps.length}`;
        guideTitleLabel.textContent = step.title;
        guideDescLabel.textContent = step.desc;
        guidePrevButton.disabled = guideIndex === 0;
        guideNextButton.textContent = guideIndex === steps.length - 1 ? "시작하기" : "다음";
        focusGuideTarget(step);
        window.requestAnimationFrame(() => {
          positionGuideCard(step);
        });
      }

      function openGuide(startIndex) {
        const steps = getGuideSteps();
        guideIndex = Math.max(0, Math.min(steps.length - 1, startIndex || 0));
        guideOpen = true;
        guideOverlay.hidden = false;
        document.body.style.overflow = "hidden";
        renderGuideStep();
      }

      function closeGuide(markSeen) {
        guideOpen = false;
        guideOverlay.hidden = true;
        document.body.style.overflow = "";
        clearGuideFocus();
        if (markSeen) {
          markGuideSeen();
        }
      }

      function scheduleInitialGuide() {
        if (hasSeenGuide()) {
          return;
        }
        if (guideTimer) {
          clearTimeout(guideTimer);
        }
        guideTimer = setTimeout(() => {
          openGuide(0);
        }, 320);
      }

      function configureProtocolHint() {
        if (window.location.protocol === "file:") {
          serverHint.innerHTML =
            "file://에서는 CSV를 직접 선택해 업로드하세요. 서버 모드가 필요하면 <code>python -m http.server 8000</code> 후 <code>http://localhost:8000/viewer.html</code>로 접속하세요.";
          return;
        }

        serverHint.innerHTML =
          "브라우저의 CSV 접근 이슈가 있으면 서버 모드 권장: <code>python -m http.server 8000</code> 후 <code>http://localhost:8000/viewer.html</code> 접속";
      }

      async function copyText(text) {
        if (!text) {
          setMeta("복사할 내용이 없습니다.");
          showToast("복사할 내용이 없습니다.", true);
          return;
        }

        try {
          await navigator.clipboard.writeText(text);
          setMeta("클립보드에 복사했습니다.");
          showToast("복사 완료", false);
        } catch (error) {
          try {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            textarea.remove();
            setMeta("클립보드에 복사했습니다.");
            showToast("복사 완료", false);
          } catch (fallbackError) {
            setMeta("복사에 실패했습니다.");
            showToast("복사 실패", true);
          }
        }
      }

      function renderList() {
        state.filtered = filteredRows();

        if (state.filtered.length === 0) {
          state.selectedIndex = -1;
          listContainer.innerHTML = '<div class="empty">조건에 맞는 게시글이 없습니다.</div>';
          countLabel.textContent = "0건";
          updateStats();
          renderDetail();
          return;
        }

        if (state.selectedIndex < 0 || state.selectedIndex >= state.filtered.length) {
          state.selectedIndex = 0;
        }

        const items = state.filtered
          .map((row, index) => {
            const activeClass = index === state.selectedIndex ? "active" : "";
            const statusChip = isInsufficient(row)
              ? '<span class="chip warn">보류</span>'
              : '<span class="chip">정상</span>';
            return `
              <button class="post-item ${activeClass}" data-index="${index}">
                <p class="post-title">${escapeHtml(row.original_title || "(제목 없음)")}</p>
                <p class="post-question">${escapeHtml(previewQuestion(row))}</p>
                <div class="post-sub">
                  <span class="chip">ID ${escapeHtml(row.source_id || "-")}</span>
                  ${statusChip}
                  <span class="chip model-chip">${escapeHtml(row.model || "-")}</span>
                </div>
              </button>
            `;
          })
          .join("");

        listContainer.innerHTML = items;
        countLabel.textContent = `${state.filtered.length}건`;
        updateStats();

        listContainer.querySelectorAll(".post-item").forEach((button) => {
          button.addEventListener("click", () => {
            state.selectedIndex = Number(button.dataset.index);
            renderList();
            renderDetail();
          });
        });
      }

      function renderCard(title, text, copyLabel) {
        const escapedTitle = escapeHtml(title);
        const escapedText = escapeHtml(text || "(내용 없음)");
        return `
          <section class="card">
            <div class="card-head">
              <p class="card-title">${escapedTitle}</p>
              <button class="alt copy-btn" data-copy="${encodeURIComponent(text || "")}" type="button">${escapeHtml(copyLabel)}</button>
            </div>
            <pre>${escapedText}</pre>
          </section>
        `;
      }

      function renderDetail() {
        if (state.selectedIndex < 0 || state.selectedIndex >= state.filtered.length) {
          detailContainer.innerHTML = '<div class="empty">목록에서 게시글을 선택하세요.</div>';
          return;
        }

        const row = state.filtered[state.selectedIndex];
        detailContainer.innerHTML = [
          renderCard(
            `메타 정보 (ID: ${row.source_id || "-"}, 모델: ${row.model || "-"})`,
            `제목: ${row.original_title || ""}\n질문: ${row.original_question || ""}`,
            "메타 복사"
          ),
          renderCard("원문 질문", row.original_question || "", "질문 복사"),
          renderCard("원문 답변", row.original_answer || "", "원문 복사"),
          renderCard("변환 결과", row.transformed_text || "", "변환 복사"),
        ].join("");

        detailContainer.querySelectorAll(".copy-btn").forEach((button) => {
          button.addEventListener("click", () => {
            copyText(decodeURIComponent(button.dataset.copy || ""));
          });
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function readFileAsText(file) {
        // file:// 환경 호환을 위해 FileReader 표준 API를 고정 사용한다.
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(reader.error || new Error("파일 읽기 실패"));
          reader.readAsText(file, "utf-8");
        });
      }

      async function handleCsvFile(file) {
        if (!file) {
          return;
        }

        if (!String(file.name || "").toLowerCase().endsWith(".csv")) {
          setMeta("CSV 파일만 업로드할 수 있습니다.");
          return;
        }

        try {
          setMeta(`${file.name} 파일을 읽는 중입니다...`);
          const text = await readFileAsText(file);
          await loadCsvText(text, file.name);
        } catch (error) {
          const reason = error && error.message ? error.message : String(error);
          setMeta(`파일 로드 실패: ${reason}`);
        }
      }

      function resetFilters() {
        searchInput.value = "";
        state.onlyInsufficient = false;
        state.sortOrder = "id_desc";
        sortOrderSelect.value = state.sortOrder;
        toggleInsufficientButton.textContent = "보류건만 보기: OFF";
        renderList();
        renderDetail();
        setMeta("검색/필터/정렬을 초기화했습니다.");
      }

      function bindDropZone() {
        const cancel = (event) => {
          event.preventDefault();
          event.stopPropagation();
        };
        const onEnter = (event) => {
          cancel(event);
          dropZone.classList.add("drag");
        };
        const onLeave = (event) => {
          cancel(event);
          dropZone.classList.remove("drag");
        };
        const onDrop = (event) => {
          cancel(event);
          dropZone.classList.remove("drag");
          const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
          handleCsvFile(file);
        };

        ["dragenter", "dragover"].forEach((type) => dropZone.addEventListener(type, onEnter));
        ["dragleave", "drop"].forEach((type) => dropZone.addEventListener(type, onLeave));
        dropZone.addEventListener("drop", onDrop);
      }

      function applyRows(rows, sourceName) {
        state.rows = rows;
        state.selectedIndex = 0;
        dropZone.textContent = `${sourceName} 로드됨 - 다른 CSV로 교체하려면 클릭/드롭`;
        renderList();
        renderDetail();

        const insufficientCount = rows.filter((row) => isInsufficient(row)).length;
        setMeta(
          `${sourceName} 로드 완료: 총 ${rows.length}건, 보류 ${insufficientCount}건, 정상 ${
            rows.length - insufficientCount
          }건`
        );
      }

      async function loadCsvText(text, sourceName) {
        const rows = parseCsv(text);
        if (rows.length === 0) {
          setMeta(`${sourceName}: CSV 파싱 결과가 비어 있습니다.`);
          state.rows = [];
          renderList();
          return;
        }

        const required = ["source_id", "original_title", "original_answer", "transformed_text"];
        const missing = required.filter((key) => !(key in rows[0]));
        if (missing.length > 0) {
          setMeta(`필수 컬럼 누락: ${missing.join(", ")}`);
          state.rows = [];
          renderList();
          return;
        }

        applyRows(rows, sourceName);
      }

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        await handleCsvFile(file);
      });

      searchInput.addEventListener("input", () => {
        renderList();
        renderDetail();
      });

      clearSearchButton.addEventListener("click", () => {
        searchInput.value = "";
        renderList();
        renderDetail();
      });

      resetViewButton.addEventListener("click", () => {
        resetFilters();
      });

      sortOrderSelect.addEventListener("change", () => {
        state.sortOrder = sortOrderSelect.value;
        renderList();
        renderDetail();
      });

      toggleInsufficientButton.addEventListener("click", () => {
        state.onlyInsufficient = !state.onlyInsufficient;
        toggleInsufficientButton.textContent = `보류건만 보기: ${state.onlyInsufficient ? "ON" : "OFF"}`;
        renderList();
        renderDetail();
      });

      openGuideButton.addEventListener("click", () => {
        openGuide(0);
      });

      guideSkipButton.addEventListener("click", () => {
        closeGuide(true);
      });

      guidePrevButton.addEventListener("click", () => {
        guideIndex = Math.max(0, guideIndex - 1);
        renderGuideStep();
      });

      guideNextButton.addEventListener("click", () => {
        const steps = getGuideSteps();
        if (guideIndex >= steps.length - 1) {
          closeGuide(true);
          return;
        }
        guideIndex += 1;
        renderGuideStep();
      });

      guideOverlay.addEventListener("click", (event) => {
        if (event.target === guideOverlay) {
          closeGuide(true);
        }
      });

      window.addEventListener("resize", () => {
        if (!guideOpen) {
          return;
        }
        const step = getGuideSteps()[guideIndex];
        positionGuideCard(step);
      });

      copyOriginalAll.addEventListener("click", () => {
        if (state.selectedIndex < 0 || state.selectedIndex >= state.filtered.length) {
          setMeta("선택된 게시글이 없습니다.");
          return;
        }
        const row = state.filtered[state.selectedIndex];
        copyText(`제목: ${row.original_title || ""}\n질문: ${row.original_question || ""}\n답변: ${row.original_answer || ""}`);
      });

      copyTransformedAll.addEventListener("click", () => {
        if (state.selectedIndex < 0 || state.selectedIndex >= state.filtered.length) {
          setMeta("선택된 게시글이 없습니다.");
          return;
        }
        const row = state.filtered[state.selectedIndex];
        copyText(row.transformed_text || "");
      });

      window.addEventListener("error", (event) => {
        const reason = event.error && event.error.message ? event.error.message : event.message;
        if (reason) {
          setMeta(`오류: ${reason}`);
        }
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reason = event.reason && event.reason.message ? event.reason.message : String(event.reason);
        if (reason) {
          setMeta(`오류: ${reason}`);
        }
      });

      window.addEventListener("keydown", (event) => {
        if (guideOpen) {
          if (event.key === "Escape") {
            closeGuide(true);
            return;
          }
          if (event.key === "ArrowRight") {
            event.preventDefault();
            const steps = getGuideSteps();
            guideIndex = Math.min(steps.length - 1, guideIndex + 1);
            renderGuideStep();
            return;
          }
          if (event.key === "ArrowLeft") {
            event.preventDefault();
            guideIndex = Math.max(0, guideIndex - 1);
            renderGuideStep();
            return;
          }
          return;
        }

        const target = event.target;
        const tagName = target && target.tagName ? String(target.tagName).toUpperCase() : "";
        if (tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT") {
          return;
        }
        if (state.filtered.length === 0) {
          return;
        }

        if (event.key === "ArrowDown") {
          event.preventDefault();
          state.selectedIndex = Math.min(state.filtered.length - 1, state.selectedIndex + 1);
          renderList();
          renderDetail();
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          state.selectedIndex = Math.max(0, state.selectedIndex - 1);
          renderList();
          renderDetail();
        }
      });

      configureProtocolHint();
      bindDropZone();
      updateStats();
      scheduleInitialGuide();
    </script>
  </body>
</html>
